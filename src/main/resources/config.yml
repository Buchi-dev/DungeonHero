DungeonHero:
  Locale: en_us
  Gameplay:
    ConfigVersion: 1
    Debug: false
    Features:
      # The existing Dungeon_world/DungeonCore loop remains authoritative for spawning.
      # This feature composes framework objectives and rewards around that loop.
      open-world-dungeon:
        Enabled: true
        ConfigVersion: 1
        Worlds:
          - dungeon_world
        Objectives:
          - Id: crypt-zombies
            Type: defeat_mobs
            Mob: ZOMBIE
            Amount: 20
        Conditions: []
        Actions: []
        Rewards:
          - Id: crypt-diamond-reward
            Type: item
            Material: DIAMOND
            Amount: 2
        Timers:
          completion-cooldown-seconds: 60
        Triggers: []
      blood-arena:
        Enabled: false
        ConfigVersion: 1
        ArenaWorld: dungeon_arenas
        ArenaId: crypt_colosseum
        # Coordinates point into a prebuilt, protected arena. No blocks are placed by DungeonHero.
        PlayerSpawn:
          X: 0
          Y: 100
          Z: 0
          Yaw: 0
          Pitch: 0
        BossSpawn:
          X: 0
          Y: 100
          Z: 0
          Yaw: 180
          Pitch: 0
        TargetRadius: 24
        MaximumPlayers: 5
        DurationSeconds: 45
        ReturnPlayersAfterFight: true
        PreventTeleport: true
        PreventPearls: true
        Effects:
          BoundaryParticle: REDSTONE
          EntranceSound: ENTITY_WITHER_SPAWN
          CombatSound: ENTITY_ENDER_DRAGON_GROWL
        Phases:
          - DelaySeconds: 10
            Action: summon_reinforcements
            Mob: Cryptling
            Amount: 3
          - DelaySeconds: 25
            Action: apply_effect
            Effect: DARKNESS
            DurationSeconds: 5
        Rewards:
          RewardOnTimeout: false
          Commands: []
  Fragments:
    "mm:HeroDamageFragment":
      Type: fragment
      Stat: DAMAGE
      Amount: 2
    "mm:HeroArmorFragment":
      Type: fragment
      Stat: ARMOR
      Amount: 1
  Armor:
    Enabled: true
    MaxLevel: 100
    LevelReductionPerLevel: 0.0015
    MaxLevelReduction: 0.15
    FragmentReductionPerPoint: 0.01
    MaxFragmentReduction: 0.20
    MaxTotalReduction: 0.40
    LastStandHealthThreshold: 0.30
    LastStandCooldownSeconds: 30
    MaximumStoredArmor: 100000
    RankCaps:
      1: 10
      2: 20
      3: 35
      4: 55
      5: 80
      6: 110
      7: 145
      8: 185
      9: 230
      10: 280
  Progression:
    SwordXPItem:
      Material: EXPERIENCE_BOTTLE
      Name: "&aHero Sword XP"
      Lore:
        - "&7Use this to increase Sword XP."
      XP: 25
    AutoMobKillXP: true
    HostileMobKillXPOnly: true
    XPPerMobKill: 10
    MythicMobXP: 25
    EliteXP: 100
    MinibossXP: 400
    RareBossXP: 1000
    BaseXPRequired: 100
    XPRequiredMultiplier: 1.25
    MaxSwordLevel: 100
  HeroAscension:
    Enabled: true
    RequiredSwordLevel: 100
    MaxPrestige: 5
    ConfirmationSeconds: 30
    XpMultiplier: 2.0
    RareDropBonuses:
      1: 0.10
      2: 0.15
      3: 0.20
      4: 0.25
      5: 0.30
    # Only these configured mob drops can receive the bonus; guaranteed/admin rewards are not touched.
    RareDropEligibleMaterials: []
    RareDropEligibleMythicItems:
      - mm:HeroDamageFragment
  FragmentCaps:
    MaximumStoredDamage: 100000
    RankCaps:
      1: 10
      2: 20
      3: 35
      4: 55
      5: 80
      6: 110
      7: 145
      8: 185
      9: 230
      10: 280
  Ranks:
    CoinName: "Dungeon Coins"
    List:
      "1":
        Name: Novice
        RequiredSwordLevel: 1
        SwordLevelCap: 10
        ArmorLevelCap: 10
        Cost: 0
      "2":
        Name: Apprentice
        RequiredSwordLevel: 10
        SwordLevelCap: 20
        ArmorLevelCap: 20
        Cost: 100
      "3":
        Name: Adventurer
        RequiredSwordLevel: 20
        SwordLevelCap: 30
        ArmorLevelCap: 30
        Cost: 250
      "4":
        Name: Warrior
        RequiredSwordLevel: 30
        SwordLevelCap: 40
        ArmorLevelCap: 40
        Cost: 500
      "5":
        Name: Elite
        RequiredSwordLevel: 40
        SwordLevelCap: 50
        ArmorLevelCap: 50
        Cost: 1000
      "6":
        Name: Champion
        RequiredSwordLevel: 50
        SwordLevelCap: 60
        ArmorLevelCap: 60
        Cost: 2000
      "7":
        Name: Master
        RequiredSwordLevel: 60
        SwordLevelCap: 70
        ArmorLevelCap: 70
        Cost: 4000
      "8":
        Name: Grandmaster
        RequiredSwordLevel: 70
        SwordLevelCap: 80
        ArmorLevelCap: 80
        Cost: 8000
      "9":
        Name: Legend
        RequiredSwordLevel: 80
        SwordLevelCap: 90
        ArmorLevelCap: 90
        Cost: 16000
      "10":
        Name: Hero
        RequiredSwordLevel: 90
        SwordLevelCap: 100
        ArmorLevelCap: 100
        Cost: 32000
  Hud:
    UseVanillaXpBar: true
    UpdateTicks: 10
  MobScaling:
    Enabled: true
    Worlds:
      - dungeon_world
    SearchRadius: 32
    MobLevelSource: EFFECTIVE_SWORD_LEVEL
    PartyScalingMode: HIGHEST
    MaxPlayers: 5
    MaximumMobLevel: 104
    LevelOffsets:
      Normal: {Min: -2, Max: 4}
      Elite: {Min: 0, Max: 4}
      Miniboss: {Min: 1, Max: 4}
      RareBoss: {Min: 2, Max: 4}
    Debug: false
  MobHp:
    NormalBase: 400
    NormalHpPerLevel: 40
    ProfileMultipliers:
      Normal: 1.0
      Elite: 3.0
      Miniboss: 8.0
      RareBoss: 18.0
    MinimumAttacks:
      Normal: 6
      Elite: 12
      Miniboss: 25
      RareBoss: 50
    MaximumAmplifierCompensation: 0.50
    DamageAmplifierCompensationPerDamage: 0.005
  DamageProtection:
    CriticalDamageMultiplier: 4.0
  DamageAmplifiers:
    ApprovedPotionEffects:
      - strength
    PotionCompensationPerLevel: 0.02
  Admin:
    ResetSwordPermission: dungeonhero.admin.resetsword
  Party:
    Enabled: true
    MaxSize: 5
    RequireSameWorld: true
    InvitationSeconds: 60
  DungeonRush:
    Enabled: true
    Worlds:
      - dungeon_world
    Biomes: []
    DurationMinutes: 5
    IntervalMinutes: 60
    FirstDelayMinutes: 5
    MinimumKills: 1
    QuestTypes:
      - MOST_DUNGEON_MOBS_KILLED
      - MOST_MYTHIC_MOBS_KILLED
    Rewards:
      First:
        - Type: coins
          Amount: 100
        - Type: sword_xp
          Amount: 25
      Second:
        - Type: coins
          Amount: 75
        - Type: sword_xp
          Amount: 25
      Third:
        - Type: coins
          Amount: 50
        - Type: sword_xp
          Amount: 25
  TargetDummy:
    Enabled: true
    Health: 1000
    SearchRadius: 48
    SpawnDistance: 3
    DamageWindowSeconds: 5
    Hologram:
      Enabled: true
      Height: 2.6
