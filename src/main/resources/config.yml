DungeonHero:
  Locale: en_us
  Gameplay:
    ConfigVersion: 1
    Debug: false
    Features:
      # The existing Dungeon_world/DungeonCore loop remains authoritative for spawning.
      # This feature composes framework objectives and rewards around that loop.
      open-world-dungeon:
        Enabled: true
        ConfigVersion: 1
        Worlds:
          - dungeon_world
        Objectives:
          - Id: crypt-zombies
            Type: defeat_mobs
            Mob: ZOMBIE
            Amount: 20
        Conditions: []
        Actions: []
        Rewards:
          - Id: crypt-diamond-reward
            Type: item
            Material: DIAMOND
            Amount: 2
        Timers:
          completion-cooldown-seconds: 60
        Triggers: []
  Fragments:
    "mm:HeroDamageFragment":
      Type: fragment
      Stat: DAMAGE
      Amount: 2
  Progression:
    SwordXPItem:
      Material: EXPERIENCE_BOTTLE
      Name: "&aHero Sword XP"
      Lore:
        - "&7Use this to increase Sword XP."
      XP: 25
    AutoMobKillXP: true
    HostileMobKillXPOnly: true
    XPPerMobKill: 10
    MythicMobXP: 25
    EliteXP: 100
    MinibossXP: 400
    RareBossXP: 1000
    BaseXPRequired: 100
    XPRequiredMultiplier: 1.25
    MaxSwordLevel: 100
    Prestige:
      Enabled: true
      MaxPrestige: 5
  Ranks:
    CoinName: "Dungeon Coins"
    List:
      "1":
        Name: Novice
        RequiredSwordLevel: 1
        SwordLevelCap: 10
        Cost: 0
      "2":
        Name: Apprentice
        RequiredSwordLevel: 10
        SwordLevelCap: 20
        Cost: 100
      "3":
        Name: Adventurer
        RequiredSwordLevel: 20
        SwordLevelCap: 30
        Cost: 250
      "4":
        Name: Warrior
        RequiredSwordLevel: 30
        SwordLevelCap: 40
        Cost: 500
      "5":
        Name: Elite
        RequiredSwordLevel: 40
        SwordLevelCap: 50
        Cost: 1000
      "6":
        Name: Champion
        RequiredSwordLevel: 50
        SwordLevelCap: 60
        Cost: 2000
      "7":
        Name: Master
        RequiredSwordLevel: 60
        SwordLevelCap: 70
        Cost: 4000
      "8":
        Name: Grandmaster
        RequiredSwordLevel: 70
        SwordLevelCap: 80
        Cost: 8000
      "9":
        Name: Legend
        RequiredSwordLevel: 80
        SwordLevelCap: 90
        Cost: 16000
      "10":
        Name: Hero
        RequiredSwordLevel: 90
        SwordLevelCap: 100
        Cost: 32000
  Hud:
    UseVanillaXpBar: true
    UpdateTicks: 10
  MobScaling:
    Enabled: true
    Worlds:
      - dungeon_world
    SearchRadius: 32
    PartyMode: AVERAGE
    MaxPlayers: 5
    BaseLevel: 1
    SwordLevelsPerMobLevel: 3.25
    RankPowerBonus: 0.75
    DamageBonusWeight: 0.12
    PrestigeLevelBonus: 0.0
    MaxLevel: 50
    LevelOffsets:
      Elite: 3
      Miniboss: 6
      RareBoss: 8
    Debug: false
  Party:
    Enabled: true
    MaxSize: 5
    RequireSameWorld: true
    InvitationSeconds: 60
  DungeonRush:
    Enabled: true
    Worlds:
      - dungeon_world
    Biomes: []
    DurationMinutes: 5
    IntervalMinutes: 60
    FirstDelayMinutes: 5
    MinimumKills: 1
    QuestTypes:
      - MOST_DUNGEON_MOBS_KILLED
      - MOST_MYTHIC_MOBS_KILLED
    Rewards:
      First:
        - Type: coins
          Amount: 100
        - Type: sword_xp
          Amount: 25
      Second:
        - Type: coins
          Amount: 75
        - Type: sword_xp
          Amount: 25
      Third:
        - Type: coins
          Amount: 50
        - Type: sword_xp
          Amount: 25
  TargetDummy:
    Enabled: true
    Health: 1000
    SearchRadius: 48
    SpawnDistance: 3
    DamageWindowSeconds: 5
    Hologram:
      Enabled: true
      Height: 2.6
