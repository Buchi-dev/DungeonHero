# DungeonHero MythicMobs registry
# Add or change mappings here without rebuilding DungeonHero.
# Unknown DH_/DW_ mobs still receive the normal Mythic profile when prefix
# tracking is enabled, but explicit mappings unlock custom scaling and rewards.

Profiles:
  normal:
    LevelOffset: 0
    SwordXP: 25

  elite:
    LevelOffset: 3
    SwordXP: 100

  miniboss:
    LevelOffset: 6
    SwordXP: 400

  rare_boss:
    LevelOffset: 8
    SwordXP: 1000

Mobs:
  DH_GroveStalker: {Profile: normal}
  DH_MossboundSkeleton: {Profile: normal}
