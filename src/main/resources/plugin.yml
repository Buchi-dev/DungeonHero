name: DungeonHero
version: '${version}'
main: com.dungeonhero.DungeonHeroPlugin
description: A dungeon adventure plugin for Paper.
api-version: '26.1'
authors:
  - DungeonHero
depend: [MythicMobs]
commands:
  dungeonhero:
    description: Shows DungeonHero status and opens the Hero Forge.
    usage: /dungeonhero [help|reload|forge|give|give-xp|sword|rank|rankup|reputation|contract|party|prestige|dummy|version]
    aliases: [dh]
permissions:
  dungeonhero.admin:
    description: Allows administrative DungeonHero commands.
    default: op
    children:
      dungeonhero.admin.reload: true
      dungeonhero.admin.give: true
      dungeonhero.admin.coins: true
      dungeonhero.admin.reputation: true
      dungeonhero.admin.dummy.remove: true
      dungeonhero.admin.dummy.remove-all: true
  dungeonhero.admin.reload:
    description: Allows reloading DungeonHero configuration.
    default: false
  dungeonhero.admin.give:
    description: Allows giving configured MythicMobs items.
    default: false
  dungeonhero.admin.coins:
    description: Allows setting, adding, and taking Dungeon Coins.
    default: false
  dungeonhero.admin.reputation:
    description: Allows adjusting shared Dungeon Reputation.
    default: false
  dungeonhero.admin.dummy.remove:
    description: Allows removing Training Dummies in the current world.
    default: false
  dungeonhero.admin.dummy.remove-all:
    description: Allows removing all DungeonHero Training Dummies from loaded worlds.
    default: false
  dungeonhero.coins.balance:
    description: Allows viewing your Dungeon Coin balance.
    default: true
  dungeonhero.coins.balance.others:
    description: Allows viewing another player’s Dungeon Coin balance.
    default: op
  dungeonhero.coins.transfer:
    description: Allows transferring Dungeon Coins to another player.
    default: true
